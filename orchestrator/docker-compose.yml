services:
  orchestrator:
    build: .
    container_name: orchestrator
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1:8b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
